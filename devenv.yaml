inputs:
  nixpkgs:
    url: github:nixos/nixpkgs/nixos-26.05
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  devenv-module-operaton:
    url: gitlab:vasara-bpm/devenv-module-operaton/oauth2
  devenv-module-uv2nix:
    url: gitlab:vasara-bpm/devenv-module-uv2nix
    flake: false
  pyproject-build-systems:
    url: github:pyproject-nix/build-system-pkgs
    inputs:
      nixpkgs:
        follows: nixpkgs
      pyproject-nix:
        follows: pyproject-nix
      uv2nix:
        follows: uv2nix
  pyproject-nix:
    url: github:pyproject-nix/pyproject.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  uv2nix:
    url: github:pyproject-nix/uv2nix
    inputs:
      nixpkgs:
        follows: nixpkgs
      pyproject-nix:
        follows: pyproject-nix
profile: shell
imports:
  - devenv-module-operaton/module.nix
  - devenv-module-uv2nix
