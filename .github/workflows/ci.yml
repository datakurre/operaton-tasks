name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        if: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: datakurre
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run linting & type checks
        run: nix run github:cachix/devenv/latest -- shell --no-eval-cache -- make check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        if: ${{ secrets.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: datakurre
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run integration tests
        run: nix run github:cachix/devenv/latest -- shell --no-eval-cache -- make devenv-test
        timeout-minutes: 15

      - name: Push to Cachix
        if: ${{ always() && secrets.CACHIX_AUTH_TOKEN != '' }}
        run: |
          nix run github:cachix/devenv/latest -- shell --no-eval-cache -- bash -c 'nix-store -qR --include-outputs /nix/store/*-devenv-shell* 2>/dev/null | cachix push datakurre || true'

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: htmlcov/
          retention-days: 30
