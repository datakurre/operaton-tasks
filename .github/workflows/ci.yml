name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: Setup Cachix (read-only)
        uses: cachix/cachix-action@v17
        with:
          name: vasara-bpm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install devenv
        run: nix profile add github:cachix/devenv/v2.1.2 --accept-flake-config

      - name: Run linting & type checks
        run: devenv shell make check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      - name: Setup Cachix (read-only)
        uses: cachix/cachix-action@v17
        with:
          name: vasara-bpm
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install devenv
        run: nix profile add github:cachix/devenv/v2.1.2 --accept-flake-config

      - name: Run integration tests
        run: devenv shell make devenv-test
        timeout-minutes: 15

      - name: Upload coverage reports
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-reports
          path: htmlcov/
          retention-days: 30
