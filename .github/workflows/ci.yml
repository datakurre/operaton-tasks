name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          logger: pretty
          log-directives: nix_installer=debug
          diagnostic-endpoint: ""

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: datakurre
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Show devenv info
        run: devenv info

      - name: Run linting & type checks
        run: devenv shell -- make check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v13
        with:
          logger: pretty
          log-directives: nix_installer=debug
          diagnostic-endpoint: ""

      - name: Setup Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v7

      - name: Setup Cachix
        uses: cachix/cachix-action@v15
        with:
          name: datakurre
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      - name: Run integration tests
        run: make devenv-test
        timeout-minutes: 15

      - name: Push to Cachix
        if: always()
        run: |
          devenv shell -- bash -c 'nix-store -qR --include-outputs /nix/store/*-devenv-shell* 2>/dev/null | cachix push datakurre || true'

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: htmlcov/
          retention-days: 30
