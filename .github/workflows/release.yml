name: Release to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: vasara-bpm
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Run linting & type checks
        run: nix run github:cachix/devenv/latest -- shell --no-eval-cache -- make check

  test:
    name: Tests
    needs: check
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: vasara-bpm
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Run integration tests
        run: nix run github:cachix/devenv/latest -- shell --no-eval-cache -- make devenv-test
        timeout-minutes: 15

      - name: Push to Cachix
        if: ${{ always() && env.CACHIX_AUTH_TOKEN != '' }}
        run: |
          nix run github:cachix/devenv/latest -- shell --no-eval-cache -- bash -c 'nix-store -qR --include-outputs /nix/store/*-devenv-shell* 2>/dev/null | cachix push vasara-bpm || true'

  build:
    name: Build Package
    needs: test
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: vasara-bpm
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Build wheel
        run: nix run github:cachix/devenv/latest -- shell --no-eval-cache -- make build

      - name: Push to Cachix
        if: ${{ always() && env.CACHIX_AUTH_TOKEN != '' }}
        run: |
          nix run github:cachix/devenv/latest -- shell --no-eval-cache -- bash -c 'nix-store -qR --include-outputs /nix/store/*-devenv-shell* /nix/store/*-python* 2>/dev/null | cachix push vasara-bpm || true'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: result/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    environment:
      name: pypi
      url: https://pypi.org/project/operaton-tasks/
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Cachix
        if: ${{ env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v15
        with:
          name: vasara-bpm
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
